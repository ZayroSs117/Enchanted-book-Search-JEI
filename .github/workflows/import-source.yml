name: Complete source import

on:
  push:
    branches:
      - main
    paths:
      - '.source-import/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild the main Java source
        shell: bash
        run: |
          set -euo pipefail
          target='src/main/java/fr/lilian/enchantedbooksearch/EnchantedBookSearchJeiPlugin.java'
          mkdir -p "$(dirname "$target")"
          cat .source-import/plugin.b64.part* | tr -d '\n' | base64 --decode > "$target"

          rm -rf .source-import
          rm -f .github/workflows/import-source.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Ajoute le plugin JEI principal'
          git push
